<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SMOH Mail Tracker</title>
    <!-- Office.js MUST be loaded from the Microsoft CDN (platform requirement). -->
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <style>
      :root { color-scheme: light dark; font-family: 'Segoe UI', system-ui, sans-serif; }
      body { margin: 0; padding: 16px; font-size: 14px; }
      h1 { font-size: 16px; margin: 0 0 12px; }
      .muted { color: #666; }
      button {
        font: inherit; padding: 8px 14px; border: 0; border-radius: 4px;
        background: #0f6cbd; color: #fff; cursor: pointer;
      }
      button:disabled { opacity: 0.5; cursor: default; }
      .row { margin: 10px 0; }
      .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; background: #e6f2fb; }
      #status { min-height: 18px; }
      ul { padding-left: 18px; }
      .error { color: #b00020; }
      .ok { color: #107c10; }
      input[type='text'] {
        font: inherit; padding: 6px 8px; border: 1px solid #b3b3b3;
        border-radius: 4px; width: 58%;
      }
      #regarding-results { list-style: none; padding-left: 0; margin: 8px 0 0; }
      #regarding-results li { margin: 4px 0; }
      button.link {
        background: none; color: #0f6cbd; padding: 4px 0; border: 0;
        text-align: left; text-decoration: underline; cursor: pointer;
      }
      hr { border: 0; border-top: 1px solid #e0e0e0; margin: 14px 0; }
    </style>
  </head>
  <body>
    <h1>SMOH Mail Tracker</h1>
    <div id="signin" class="row">
      <button id="signin-btn">Sign in</button>
      <span class="muted"> to link this email to your CRM.</span>
    </div>
    <div id="app" hidden>
      <div class="row" id="who"></div>
      <div class="row" id="contact"></div>
      <div class="row"><button id="log-btn" disabled>Log this email to CRM</button></div>
      <div class="row" id="timeline"></div>

      <div id="regarding" hidden>
        <hr />
        <div class="row muted">Set Regarding — link this email to a CRM record:</div>
        <div class="row">
          <input id="regarding-q" type="text" placeholder="Search contacts, leads, accounts…" />
          <button id="regarding-search-btn">Search</button>
        </div>
        <ul id="regarding-results"></ul>
        <div id="regarding-status" class="row"></div>
      </div>
    </div>
    <div id="status" class="row"></div>
  </body>
</html>
